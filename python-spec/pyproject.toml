[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ax25sdl"
version = "0.0.0"
description = "AX.25 v2.2 SDL specification as Python data structures. Generated from spec-sdl/."
requires-python = ">=3.11"
license = "MIT"

[tool.setuptools]
packages = ["ax25sdl"]

[tool.pytest.ini_options]
testpaths = ["tests", "ax25sdl"]
python_files = ["*_test.py", "test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = ["E501"]  # generated files have intentionally long lines
