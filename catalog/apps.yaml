    description: "Distributed Asynchronous Packet Pub/Sub — store-and-forward messaging over packet radio."
    icon: inbox
    capabilities: [packet, web]
    homepage: https://github.com/packet-net/dapps
    artifact:
      kind: assets
      manifest:
        url: https://github.com/packet-net/dapps/releases/download/v0.34.2/pdn-app.yaml
