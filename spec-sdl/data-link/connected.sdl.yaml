  # ─── Column 2 continued — V(r) I Frame Stored? = Yes paths ──────────
  #
  # In figc4.4 the n148 "V(r) I Frame Stored?" Yes branch is a loop:
  # n149 Retrieve Stored V(r) I Frame → n150 DL-DATA Indication →
  # n151 V(r) := V(r) + 1 → back to n148. Each iteration delivers one
  # previously-stored out-of-sequence frame. The loop terminates when
  # no further frame is stored at the new V(r), at which point the
  # column continues with n152 (P == 1?).
  #
  # Encoding the loop in a flat path: the YAML carries one iteration of
  # the loop body (retrieve, DL-DATA indication, increment V(r)) and a
  # `verification_pending` note explaining the figure semantics. The
  # runtime dispatcher will need to interpret these three actions as a
  # loop body when wiring real handlers — see notes on t67-t69. Added
  # at the end to avoid renumbering t12-t66; semantically they belong
  # to column 2 alongside t02-t17.

  - id: t67_i_received_in_seq_stored_p_eq_1
    on: I_received
    path:
      - { decision: command,            branch: "Yes" }
      - { decision: info_field_valid,   branch: "Yes" }
      - { decision: nr_in_window,       branch: "Yes" }
      - { action: Check_I_Frames_Acknowledged, kind: subroutine }
      - { decision: own_receiver_busy,  branch: "No" }
      - { decision: ns_eq_vr,           branch: "Yes" }
      - { action: "V(r) := V(r) + 1",            kind: processing }
      - { action: clear_reject_exception,         kind: processing }
      - { action: "decrement_srej_exception_if_gt_0", kind: processing }
      - { action: DL_DATA_indication,             kind: signal_upper }
      - { decision: vr_i_frame_stored,  branch: "Yes" }
      - { action: retrieve_stored_V_r_I_frame,    kind: processing }
      - { action: DL_DATA_indication,             kind: signal_upper }
      - { action: "V(r) := V(r) + 1",            kind: processing }
      - { decision: p_eq_1,             branch: "Yes" }
      - { action: "F := 1",             kind: processing }
      - { action: "N(R) := V(r)",       kind: processing }
      - { action: RR,                   kind: signal_lower }
      - { action: clear_acknowledge_pending, kind: processing }
    next: Connected
    notes: |
      verification_pending: the path[] above lists *one iteration* of
      figc4.4's "V(r) I Frame Stored?" Yes loop (n148-n149-n150-n151).
      The figure's actual behaviour is to repeat retrieve / DL-DATA
      indication / V(r) := V(r)+1 until the loop's decision returns No.
      The flat-path YAML schema can't express the unbounded loop, so
      the runtime will need to treat these three actions as a loop
      body bounded by the "V(r) I Frame Stored?" predicate.

  - id: t68_i_received_in_seq_stored_p_eq_0_ack_pending
    on: I_received
    path:
      - { decision: command,            branch: "Yes" }
