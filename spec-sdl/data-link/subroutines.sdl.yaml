# SPDX-License-Identifier: MIT
#
# Transcription of figc4.7 (Data Link State Machine Subroutines) per
# the redrawn `DataLink_Subroutines.graphml`. Source-of-truth ordering
# preserved: each path lists actions / decision steps in the exact
# order they appear walking the corresponding column of the figure.
#
# Schema: spec-sdl/schema/sdl-subroutines.schema.json.
# Codegen integration is a follow-up PR; this file is data only.

machine: data_link
source:
  spec: "AX.25 v2.2 rev 4"
  figure: "C4.7"
  url: "https://github.com/packethacking/ax25spec/blob/main/doc/ax.25.2.2.4_Oct_25.md"

# Per-source pins for the four canonical implementations whose code
# we cite in each subroutine's `references:` block below. Each pin
# fixes the citation's line numbers to a specific commit so they
# stay valid when the upstream repos refactor.
pinned_refs:
  linbpq:
    repo: "https://github.com/g8bpq/linbpq"
    commit: "88a68988b446187cc5f7a2dfdbe33d1cc3ebd46f"
  direwolf:
    repo: "https://github.com/wb2osz/direwolf"
    commit: "a231971a652bfb574a4bae9a5d875fbce53d2267"
  rax25:
    repo: "https://github.com/ThomasHabets/rax25"
    commit: "d97b7ab725620497d5444e7393969b8d6f9ae58d"
  linux_oot:
    repo: "https://github.com/jeanthom/ax25"   # the rotted out-of-tree mod
    commit: "40188e901024be90f50fc37ba1ba3a84678dfe12"

# ─── Subroutines ────────────────────────────────────────────────────

subroutines:

  # ─── N(r) Error Recovery ──────────────────────────────────────────
  - name: N_r_Error_Recovery
    notes: |
      Three-step recovery when an inbound frame's N(r) is invalid.
      Signals DL-ERROR (J), calls Establish_Data_Link to restart the
      link, then clears the Layer-3-initiated flag.
    references:
      - source: linbpq
        path: L2Code.c
        function: SDNRCHK
        line: 2936
        note: "Sets SDREJF |= SDNRER on bad N(r); callers (SDIFRM line 2530, SFRAME line 2277) then call SDFRMR which sends FRMR and parks in state 3. No separate Z-error recovery path — linbpq inlines the diagnosis and uses FRMR rather than DL-ERROR(J)+Establish_Data_Link."
      - source: direwolf
        path: src/ax25_link.c
        function: nr_error_recovery
        line: 5730
        note: "Direct SDL transliteration; logs Error J then calls establish_data_link and clears layer_3_initiated. Matches figc4.7 exactly."
      - source: rax25
        path: src/state.rs
        function: "Data::nr_error_recovery"
        line: 592
        note: "Matches spec; clears layer3_initiated, returns DL-ERROR(J) and Establish_Data_Link action."
      - source: linux_oot
        path: net/ax25/ax25_std_subr.c
        function: ax25_std_nr_error_recovery
        line: 30
        note: "Trivially delegates to ax25_std_establish_data_link; does NOT signal DL-ERROR(J) and does not save peer_busy. Materially incomplete vs the spec (note: linux_oot is known-rotted per project memory)."
    paths:
      - id: t01_recover
        path:
          - { action: "DL-ERROR Indication (J)", kind: signal_upper }
          - { action: "Establish Data Link",     kind: subroutine }
          - { action: "Clear Layer 3 Initiated", kind: processing }

  # ─── Clear Exception Conditions ───────────────────────────────────
  - name: Clear_Exception_Conditions
    notes: |
      Six-action reset of all exception bookkeeping. Drawn as a single
      multi-line processing box in the figure; transcribed as one
      action per line per the runbook's multi-line-box rule.
    references:
      - source: linbpq
        path: L2Code.c
        function: RESET2
        line: 3059
        note: "RESET2 wraps CLEARL2QUEUES (drops all queued I/RX/TX_Q buffers, line 3032) and RESET2X (clears reject flags, window pointers, N(r)/N(s), L2FLAGS, line 3019). Conflates 'clear exception conditions' with 'reset state to 5'."
      - source: direwolf
        path: src/ax25_link.c
        function: clear_exception_conditions
        line: 5788
        note: "Clears peer/own receiver busy, reject_exception, acknowledge_pending and discards rxdata_by_ns; no explicit srej-exception field. Comment notes the I-queue is intentionally retained (divergence from spec wording 'discard I queue')."
      - source: rax25
        path: src/state.rs
        function: "Data::clear_exception_conditions"
        line: 792
        note: "Clears peer_receiver_busy, reject_exception, own_receiver_busy, acknowledge_pending, sreject_exception, AND iframe_queue (queue-clear is a 2017 spec addition; rax25 author flags it as surprising in inline comment)."
      - source: linux_oot
        note: "omitted: no standalone routine; inlined as `ax25->condition = 0x00;` at ax25_std_subr.c:37 inside establish_data_link. Not a separable citation."
    paths:
      - id: t01_clear_all
        path:
          - { action: "Clear Peer Receiver Busy",   kind: processing }
          - { action: "Clear Own Receiver Busy",    kind: processing }
          - { action: "Clear Reject Condition",     kind: processing }
          - { action: "Clear Sreject Condition",    kind: processing }
          - { action: "Clear Acknowledge Pending",  kind: processing }
          - { action: "Discard I Queue Entries",    kind: processing }

  # ─── Transmit Enquiry ─────────────────────────────────────────────
  - name: Transmit_Enquiry
    notes: |
      Polls the peer with RR-cmd or RNR-cmd (P=1) depending on whether
      we ourselves are in busy state.
    references:
      - source: linbpq
        path: L2Code.c
        function: SendSupervisCmd
        line: 3600
        note: "Builds RR or RNR command with P=1 (CTL |= PFBIT), N(r):=LINKNR, sets POLLSENT, calls L2SENDCOMMAND, clears L2ACKREQ. Choice of RR vs RNR is delegated to RR_OR_RNR() (line 4143) which inspects upstream session busy and buffer pool, not a discrete own_receiver_busy bit. No T1 start here — L2TIMEOUT manages L2TIMER."
      - source: direwolf
        path: src/ax25_link.c
        function: transmit_enquiry
        line: 5858
        note: "Sends RNR-cmd if own_receiver_busy else RR-cmd, P=1, N(R)=V(R); clears acknowledge_pending; starts T1. Faithful to figc4.7."
      - source: rax25
        path: src/state.rs
        function: "Data::transmit_enquiry"
        line: 716
        note: "Clears acknowledge_pending, starts T1 (uses t1v), sends RNR-cmd if own_receiver_busy else RR-cmd, both with P=1. Returns a single Action since exactly one frame is emitted."
      - source: linux_oot
        path: net/ax25/ax25_std_subr.c
        function: ax25_std_transmit_enquiry
        line: 52
        note: "Sends RR/RNR command with P=1, clears ACK-pending, restarts T1. Uses backoff-based ax25_calculate_t1 rather than spec Select_T1_Value."
    decisions:
      - id: own_receiver_busy
        question: "Own receiver busy?"
        predicate: own_receiver_busy
    paths:
      - id: t01_not_busy_sends_rr
        path:
          - { action: "P <- 1",                     kind: processing }
          - { action: "N(r) <- V(r)",               kind: processing }
          - { decision: own_receiver_busy, branch: "No" }
          - { action: "RR Command",                 kind: signal_lower }
          - { action: "Clear Acknowledge Pending",  kind: processing }
          - { action: "Start T1",                   kind: processing }
      - id: t02_busy_sends_rnr
        path:
          - { action: "P <- 1",                     kind: processing }
          - { action: "N(r) <- V(r)",               kind: processing }
          - { decision: own_receiver_busy, branch: "Yes" }
          - { action: "RNR Command",                kind: signal_lower }
          - { action: "Clear Acknowledge Pending",  kind: processing }
          - { action: "Start T1",                   kind: processing }

  # ─── Enquiry Response ─────────────────────────────────────────────
  - name: Enquiry_Response
    references:
      - source: linbpq
        path: L2Code.c
        function: SEND_RR_RESP
        line: 3635
        note: "Builds RR/RNR/SREJ/REJ response via RR_OR_RNR(LINK, FALSE), N(r):=LINKNR, applies caller-supplied PF bit, sends response, then calls ACKMSG. SREJ-vs-REJ-vs-RR selection is inside RR_OR_RNR (line 4143): SREJ only emitted if Ver2point2 set."
      - source: direwolf
        path: src/ax25_link.c
        function: enquiry_response
        line: 5924
        note: "Heavily extended beyond figc4.7. Sends RR/RNR/SREJ as response (cr_res), not command — author flags this as spec erratum at line 5918. SREJ branch is direwolf's own addition derived from X.25 2.4.6.11 (line 5936 'Detour 1'); the unaltered spec body is preserved in the #else arm at line 6039."
      - source: rax25
        path: src/state.rs
        function: "Data::enquiry_response"
        line: 640
        note: "Simplified — does NOT implement the SREJ branches (srej_enabled / SREJ list emission). Only handles own_busy -> RNR-resp else RR-resp. Author flags as TODO at lines 642-646."
      - source: linux_oot
        path: net/ax25/ax25_std_subr.c
        function: ax25_std_enquiry_response
        line: 65
        note: "Sends RR/RNR response with F=1, clears ACK-pending. Matches figc4.7 modulo the spec's REJ-on-rej-condition branch which linux_oot omits here (ax25_ds_enquiry_response in DAMA path handles REJ; std path does not)."
    notes: |
      Polled-response handler. Five chained decisions; multiple paths
      converge on a shared "RR Response" + "Clear Acknowledge Pending"
      tail before return.

      Both figure ambiguities flagged on the original transcription
      (commit caa7326) were resolved upstream in commit 46d3782:
      n22 SREJ-Enabled?=No now explicitly routes to RR Response.
    decisions:
      - id: poll_supervisory_or_i
        question: "F == 1 & (Frame==RR || Frame==RNR || Frame==I)?"
        predicate: f_eq_1_and_supervisory_or_i
      - id: own_receiver_busy
        question: "Own Receiver Busy?"
        predicate: own_receiver_busy
      - id: srej_enabled
        question: "SREJ Enabled?"
        predicate: srej_enabled
      - id: mod_8
        question: "Mod 8?"
        predicate: mod_8
      - id: out_of_sequence_frames
        question: "Out of Sequence Frames in Receive Buffer?"
        predicate: out_of_sequence_frames_in_receive_buffer
    paths:
      - id: t01_not_polled_rr_response
        notes: |
          F==1-supervisory-or-I check fails; just send RR Response.
        path:
          - { action: "N(r) <- V(r)",              kind: processing }
          - { decision: poll_supervisory_or_i, branch: "No" }
          - { action: "RR Response",               kind: signal_lower }
          - { action: "Clear Acknowledge Pending", kind: processing }
      - id: t02_polled_busy_rnr
        notes: |
          Polled and we're busy: respond with RNR.
        path:
          - { action: "N(r) <- V(r)",              kind: processing }
          - { decision: poll_supervisory_or_i, branch: "Yes" }
          - { decision: own_receiver_busy,     branch: "Yes" }
          - { action: "RNR Response",              kind: signal_lower }
          - { action: "Clear Acknowledge Pending", kind: processing }
      - id: t03_polled_srej_disabled_rr
        notes: |
          Polled, not busy, SREJ not enabled → just RR Response.
          (Added in commit 46d3782 after the original redraw omitted
          this edge.)
        path:
          - { action: "N(r) <- V(r)",              kind: processing }
          - { decision: poll_supervisory_or_i, branch: "Yes" }
          - { decision: own_receiver_busy,     branch: "No"  }
          - { decision: srej_enabled,          branch: "No"  }
          - { action: "RR Response",               kind: signal_lower }
          - { action: "Clear Acknowledge Pending", kind: processing }
      - id: t04_polled_srej_mod8_dl_error_then_buf_yes
        notes: |
          Polled, not busy, SREJ enabled, Mod 8 (so DL-ERROR add),
          and we have stored out-of-sequence frames → emit SREJ
          before the RR Response.
        path:
          - { action: "N(r) <- V(r)",                  kind: processing }
          - { decision: poll_supervisory_or_i, branch: "Yes" }
          - { decision: own_receiver_busy,     branch: "No"  }
          - { decision: srej_enabled,          branch: "Yes" }
          - { decision: mod_8,                 branch: "Yes" }
          - { action: "DL-ERROR Indication (add)",     kind: signal_upper }
          - { decision: out_of_sequence_frames, branch: "Yes" }
          - { action: "SREJ",                          kind: signal_lower }
          - { action: "RR Response",                   kind: signal_lower }
          - { action: "Clear Acknowledge Pending",     kind: processing }
      - id: t05_polled_srej_mod8_dl_error_then_buf_no
        notes: |
          Same as t04 but no stored out-of-sequence frames → straight
          to RR Response after DL-ERROR.
        path:
          - { action: "N(r) <- V(r)",                  kind: processing }
          - { decision: poll_supervisory_or_i, branch: "Yes" }
          - { decision: own_receiver_busy,     branch: "No"  }
          - { decision: srej_enabled,          branch: "Yes" }
          - { decision: mod_8,                 branch: "Yes" }
          - { action: "DL-ERROR Indication (add)",     kind: signal_upper }
          - { decision: out_of_sequence_frames, branch: "No"  }
          - { action: "RR Response",                   kind: signal_lower }
          - { action: "Clear Acknowledge Pending",     kind: processing }
      - id: t06_polled_srej_mod128_buf_yes
        notes: |
          Polled, not busy, SREJ enabled, Mod 128 (no DL-ERROR), and
          stored frames present → SREJ then RR Response.
        path:
          - { action: "N(r) <- V(r)",                  kind: processing }
          - { decision: poll_supervisory_or_i, branch: "Yes" }
          - { decision: own_receiver_busy,     branch: "No"  }
          - { decision: srej_enabled,          branch: "Yes" }
          - { decision: mod_8,                 branch: "No"  }
          - { decision: out_of_sequence_frames, branch: "Yes" }
          - { action: "SREJ",                          kind: signal_lower }
          - { action: "RR Response",                   kind: signal_lower }
          - { action: "Clear Acknowledge Pending",     kind: processing }
      - id: t07_polled_srej_mod128_buf_no
        notes: |
          Polled, not busy, SREJ enabled, Mod 128, no stored frames →
          straight to RR Response.
        path:
          - { action: "N(r) <- V(r)",                  kind: processing }
          - { decision: poll_supervisory_or_i, branch: "Yes" }
          - { decision: own_receiver_busy,     branch: "No"  }
          - { decision: srej_enabled,          branch: "Yes" }
          - { decision: mod_8,                 branch: "No"  }
          - { decision: out_of_sequence_frames, branch: "No"  }
          - { action: "RR Response",                   kind: signal_lower }
          - { action: "Clear Acknowledge Pending",     kind: processing }

  # ─── Invoke Retransmission ────────────────────────────────────────
  - name: Invoke_Retransmission
    references:
      - source: linbpq
        path: L2Code.c
        function: RESETNS
        line: 2976
        note: "Resets LINKNS to acked N(r) and bumps framesResent stat. The actual re-pushing of I-frames onto the port queue happens later in SDETX (line 3131) which scans FRAMES[] from LINKOWS forward whenever Outstanding < window. linbpq splits the spec's loop across RESETNS (back-up V(s)) and SDETX (queue old I-frames)."
      - source: direwolf
        path: src/ax25_link.c
        function: invoke_retransmission
        line: 6075
        note: "Uses local_vs rather than mutating V(S) (deliberate divergence from spec's 'X:=V(s); V(s):=N(r); ... V(s):=X' idiom — comment at line 6078 explains the safer rewrite). Loops local_vs from nr_input until V(s), resending each I frame."
      - source: rax25
        path: src/state.rs
        function: "Data::invoke_retransmission"
        line: 674
        note: "Significant divergence — does NOT implement the V(s) backtrack loop. Simply resends the entire iframe_resend_queue. Parameter nr is unused (prefixed _). Author flags concern at lines 669-670."
      - source: linux_oot
        note: "omitted: no equivalent. linux_oot uses ax25_requeue_frames + ax25_kick (ax25_subr.c:62, ax25_out.c:251) which together approximate retransmission, but they neither take an N(r) argument nor walk V(s) backwards to N(r) as figc4.7 prescribes."
    notes: |
      Push every I-frame from N(r) up to V(s) back onto the send
      queue. Spec-canonical loop: backtrack V(s) to N(r), push,
      increment, repeat until back at X (the original V(s)).
    decisions:
      - id: v_s_neq_x
        question: "V(s) != X?"
        predicate: "not v_s_eq_x"
    paths:
      - id: t01_retransmit_loop
        path:
          - { action: "Backtrack",                       kind: processing }
          - { action: "X <- V(s)",                       kind: processing }
          - { action: "V(s) <- N(r)",                    kind: processing }
          - loop_while: v_s_neq_x
            body:
              - { action: "Push Old I Frame onto Queue", kind: internal_out }
              - { action: "V(s) <- V(s) + 1",            kind: processing }
        notes: |
          The figure draws this as a diamond loop `Push... → V(s) := V(s)+1 → V(s) == X? → if No, back to Push`. Our `loop_while` construct iterates while its predicate is TRUE, so we encode the inverse `v_s_neq_x` (predicate `not v_s_eq_x`). A future codegen extension could accept a `negate: true` modifier so the YAML can reuse the figure's literal predicate; for now we encode the inverse.

  # ─── Check I Frame Acknowledged ───────────────────────────────────
  - name: Check_I_Frame_Acknowledged
    references:
      - source: linbpq
        path: L2Code.c
        function: ACKMSG
        line: 3651
        note: "Walks LINKOWS up to new LINKWS releasing acked FRAMES[] buffers, then restarts L2TIMER if any unacked remain (with IFrameRetryCounter > N2 short-circuit that forces DISC, line 3690), else stops timer. No peer_receiver_busy branch. Combined with SDNRCHK (line 2936) which advances LINKWS via 'GoodNR:' before calling ACKMSG."
      - source: direwolf
        path: src/ax25_link.c
        function: check_i_frame_ackd
        line: 6164
        note: "Three-branch implementation matching figc4.7. peer_receiver_busy branch starts T3 and starts T1 if not running (author flags as suspect at line 6169). nr==V(s) branch stops T1, starts T3, calls select_t1_value. Else branch sets V(A) and (re)starts T1."
      - source: rax25
        path: src/state.rs
        function: "Data::check_iframe_acked"
        line: 739
        note: "Three branches (peer_busy / nr==vs / nr!=va). Picks 2017 spec for 'stop T3' in peer_busy branch (1998 said start T3). Uses srt rather than t1v in several start() calls (author flags as TODO)."
      - source: linux_oot
        path: net/ax25/ax25_out.c
        function: ax25_check_iframes_acked
        line: 381
        note: "Implements the V(s)==N(r) vs V(a)!=N(r) split; calls ax25_frames_acked and ax25_calculate_rtt. Does not reset RC/n2count to 0 in the all-acked branch (spec figc4.7 step), and uses backoff T1 rather than Select_T1_Value."
    notes: |
      Process an incoming N(r) and update V(a) / T1 / T3 state
      accordingly. Four chained decisions, multiple join paths.
    decisions:
      - id: peer_receiver_busy
        question: "Peer Receiver Busy?"
        predicate: peer_receiver_busy
      - id: n_r_eq_v_s
        question: "N(r) == V(s)?"
        predicate: n_r_eq_v_s
      - id: t1_running
        question: "T1 Running?"
        predicate: t1_running
      - id: n_r_eq_v_a
        question: "N(r) == V(a)?"
        predicate: n_r_eq_v_a
    paths:
      - id: t01_peer_busy_t1_running
        path:
          - { decision: peer_receiver_busy, branch: "Yes" }
          - { action: "V(a) <- N(r)",      kind: processing }
          - { action: "Stop T3",           kind: processing }
          - { decision: t1_running, branch: "Yes" }
      - id: t02_peer_busy_t1_stopped
        path:
          - { decision: peer_receiver_busy, branch: "Yes" }
          - { action: "V(a) <- N(r)",      kind: processing }
          - { action: "Stop T3",           kind: processing }
          - { decision: t1_running, branch: "No" }
          - { action: "Start T1",          kind: processing }
      - id: t03_caught_up_select_t1
        notes: |
          Peer not busy, N(r) == V(s): we're fully caught up. Update
          V(a), stop T1, start T3, then run Select_T1_Value to
          recompute the next T1.
        path:
          - { decision: peer_receiver_busy, branch: "No" }
          - { decision: n_r_eq_v_s,    branch: "Yes" }
          - { action: "V(a) <- N(r)",       kind: processing }
          - { action: "Stop T1",            kind: processing }
          - { action: "Start T3",           kind: processing }
          - { action: "Select T1 Value",    kind: subroutine }
      - id: t04_partial_ack_n_r_eq_v_a
        notes: |
          Peer not busy, N(r) != V(s) but N(r) == V(a): no progress;
          drop straight to the join (no action).
        path:
          - { decision: peer_receiver_busy, branch: "No" }
          - { decision: n_r_eq_v_s,    branch: "No" }
          - { decision: n_r_eq_v_a,    branch: "Yes" }
      - id: t05_partial_ack_progress
        notes: |
          Peer not busy, partial ack with progress: advance V(a) and
          restart T1.
        path:
          - { decision: peer_receiver_busy, branch: "No" }
          - { decision: n_r_eq_v_s,    branch: "No" }
          - { decision: n_r_eq_v_a,    branch: "No" }
          - { action: "V(a) <- N(r)",       kind: processing }
          - { action: "Start T1",           kind: processing }

  # ─── Establish Data Link / Establish Extended Data Link ───────────
  #
  # The redrawn figure shares one body between these two subroutine
  # starts (n46 and n47 both flow into n48). The body decides between
  # SABM and SABME via the `Mod 128?` test. We transcribe as two
  # subroutines with the same path content — caller chooses by name.
  # The Mod-128? Yes → SABME edge label was added in commit 46d3782.
  - name: Establish_Data_Link
    references:
      - source: linbpq
        path: L2Code.c
        function: SENDSABM
        line: 3065
        note: "One-liner: calls hookL2SessionAttempt and L2SENDCOMMAND(LINK, SABM | PFBIT). No Clear_Exception_Conditions, no RC=1, no T3 stop — callers do those out-of-band. Initial-establishment from outbound side happens in InternalL2SETUPCROSSLINK (line 1858) which sets L2STATE, L2TIME and either L2SENDXID or SENDSABM."
      - source: direwolf
        path: src/ax25_link.c
        function: establish_data_link
        line: 5759
        note: "Combined with Establish_Extended_Data_Link (comment at 5754 documents the merge); chooses SABME vs SABM from S->modulo==128. Off-by-one erratum flagged at lines 5768-5770 — direwolf sets RC=1 (not 0 as in figc4.7) to avoid sending N2+1 SABM(E)s."
      - source: rax25
        path: src/state.rs
        function: "Data::establish_data_link"
        line: 818
        note: "Combined with Establish_Extended_Data_Link — same function handles both. Per line 828 comment 'SendSabm actually sends SABME if modulus is 128'. Sets RC:=1 (2017 spec) rather than 0 (1998). Calls clear_exception_conditions, stops T3, restarts T1."
      - source: linux_oot
        path: net/ax25/ax25_std_subr.c
        function: ax25_std_establish_data_link
        line: 35
        note: "Clears condition, zeros n2count, sends SABM or SABME based on ax25->modulus, stops T3/T2/idle, starts T1. NB: linux_oot conflates Establish_Data_Link and Establish_Extended_Data_Link into one modulus-dispatching function."
    notes: |
      Clear exception bookkeeping, set the retry counter and P flag,
      send SABM or SABME depending on Mod 128 state, then start T1.
    decisions:
      - id: mod_128
        question: "Mod 128?"
        predicate: mod_128
    paths:
      - id: t01_mod_8_sabm
        path:
          - { action: "Clear Exception Conditions", kind: processing }
          - { action: "RC <- 1",                    kind: processing }
          - { action: "P <- 1",                     kind: processing }
          - { decision: mod_128, branch: "No" }
          - { action: "SABM",                       kind: signal_lower }
          - { action: "Stop T3",                    kind: processing }
          - { action: "Start T1",                   kind: processing }
      - id: t02_mod_128_sabme
        path:
