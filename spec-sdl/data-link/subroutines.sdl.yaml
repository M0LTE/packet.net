  # ─── Check Need for Response ──────────────────────────────────────
  - name: Check_Need_For_Response
    references:
      - source: linbpq
        path: L2Code.c
        function: SFRAME
        line: 2413
        note: "The CMD-with-PFBIT branch (line 2413-2442) replies with RR/RNR(F=1) — the Command+P=1 case of the spec routine. The Response+F=1 branch (line 2444-2486) resets N(s) when POLLSENT was outstanding, which collapses the spec's DL-ERROR(A) check into 'did we have a poll out?' rather than flagging an unsolicited F. No standalone Check_Need_For_Response routine; logic is inlined per frame type."
      - source: direwolf
        path: src/ax25_link.c
        function: check_need_for_response
        line: 6216
        note: "Faithful transliteration. cr_cmd & pf==1 -> enquiry_response with F=1; cr_res & pf==1 -> DL-ERROR A (logged); other cases silently ignored."
      - source: rax25
        path: src/state.rs
        function: "Data::check_need_for_response"
        line: 605
        note: "Matches spec — (cmd,P=1) -> enquiry_response(F=1); (resp,F=1) -> DL-ERROR(A); else silent. Returns Vec<Action>."
      - source: linux_oot
        note: "omitted: no equivalent subroutine. F/P-bit polarity handling is inlined at call sites (e.g. ax25_std_in.c:338 'if (pf && type == AX25_RESPONSE)'). Not factored as a routine."
    notes: |
      Looks at incoming command/response role + P/F bit and either
      sends Enquiry_Response(F=1) (when it was a poll), surfaces a
      DL-ERROR (A) (response with F=1 when not expected), or returns
      silently.
    decisions:
      - id: command_and_p_eq_1
        question: "Command & P == 1?"
        predicate: command_and_p_eq_1
      - id: response_and_f_eq_1
        question: "Response & F == 1?"
        predicate: response_and_f_eq_1
    paths:
      - id: t01_command_poll_enquiry_response
        path:
          - { decision: command_and_p_eq_1, branch: "Yes" }
          - { action: "Enquiry Response (F = 1)", kind: subroutine }
      - id: t02_response_f_unexpected_dl_error
        path:
          - { decision: command_and_p_eq_1, branch: "No"  }
          - { decision: response_and_f_eq_1, branch: "Yes" }
          - { action: "DL-ERROR Indication (A)", kind: signal_upper }
      - id: t03_neither_silent_return
        path:
          - { decision: command_and_p_eq_1, branch: "No"  }
          - { decision: response_and_f_eq_1, branch: "No" }

  # ─── UI Check ─────────────────────────────────────────────────────
  - name: UI_Check
    references:
      - source: linbpq
        path: L2Code.c
        function: L2FORUS
        line: 656
        note: "UI handling at L2FORUS line 656-678 dispatches by PID (NETROM 0xcf, IP 0xcc/0xcd/0x08) and otherwise drops — no info-field length check, no DL-UNIT-DATA Indication primitive, no DL-ERROR(K)/(Q). UI on existing session takes the same path at line 1065. Divergence: linbpq does not validate Command vs Response framing for UI nor enforce info-field bounds beyond buffer length."
      - source: direwolf
        note: "omitted: direwolf processes UI frames outside the data-link state machine. Comment at line 6235-6240 explicitly states 'I don't think we need this because UI frames are processed without going thru the data link state machine.' The DL-UNIT-DATA / length-validation gate of UI_Check is absent."
      - source: rax25
        path: src/state.rs
        function: "Data::ui_check"
        line: 567
        note: "Diverges from spec wording — treats !command as DL-ERROR(Q) outright (no separate length check on response path), command + oversize as DL-ERROR(K), command + valid as DL-UNIT-DATA indication. Author flags 1998 spec bug at lines 569-575 (spec says Q applies to UI with Poll set, but 4.3.3.6 contradicts)."
      - source: linux_oot
        note: "omitted: UI frames bypass the LAPB state machine entirely (ax25_in.c:229 'if ((*skb->data & ~0x10) == AX25_UI) ...'). There is no DL-state-machine UI_Check."
    notes: |
      Validates a received UI frame. Rejects if it's a response (Q
      error), accepts if info length ≤ N1 and the content is
      octet-aligned (DL-UNIT-DATA indication), or surfaces a K error.
    decisions:
      - id: ui_command
        question: "Command?"
        predicate: incoming_is_command
      - id: ui_info_valid
        question: "Info Field Length <= N1 & Content is Octet Aligned?"
        predicate: ui_info_field_valid
    paths:
      - id: t01_response_dl_error_q
        path:
          - { decision: ui_command, branch: "No" }
          - { action: "DL-ERROR Indication (Q)", kind: signal_upper }
      - id: t02_command_valid_unit_data
        path:
          - { decision: ui_command,    branch: "Yes" }
          - { decision: ui_info_valid, branch: "Yes" }
          - { action: "DL-UNIT-DATA Indication", kind: signal_upper }
      - id: t03_command_invalid_dl_error_k
        path:
          - { decision: ui_command,    branch: "Yes" }
          - { decision: ui_info_valid, branch: "No"  }
          - { action: "DL-ERROR Indication (K)", kind: signal_upper }

  # ─── Select T1 ────────────────────────────────────────────────────
  - name: Select_T1_Value
    references:
      - source: linbpq
        note: "omitted: linbpq uses a fixed L2TIME derived from PORTT1 (FRACK) plus a per-digi increment, set once in SETUPNEWL2SESSION (line 1666-1708) and InternalL2SETUPCROSSLINK (line 1908). There is no SRT IIR smoothing, no RC*0.25 backoff, no adaptive T1 logic anywhere in L2Code.c."
      - source: direwolf
        path: src/ax25_link.c
        function: select_t1_value
        line: 6304
        note: "Major divergence from figc4.7. RC==0 branch computes SRT via an IIR low-pass filter (line 6326) then T1V := SRT*2; flagged as erratum at 6309-6316. RC!=0 + t1_had_expired branch uses linear T1V := RC*0.25 + SRT*2 (line 6362) instead of the spec's exponential 2^(RC+1)*SRT, with rationale at 6352-6358 ('ridiculous' to retry over an hour). Adds T1V floor/ceiling guardrails (6386-6389)."
      - source: rax25
        path: src/state.rs
        function: "Data::select_t1_value"
        line: 689
        note: "rc==0 -> srt:=srt_default (IIR formula omitted, TODO at line 695); else if t1_expired -> srt := rc*250ms + 2*srt (matches 2017 spec '(RC/4)+SRT*2' with rc in seconds-quarters). Updates only srt, not t1v (author flags TODO at line 686)."
      - source: linux_oot
        path: net/ax25/ax25_subr.c
        function: ax25_calculate_t1
        line: 220
        note: "Materially different algorithm: linux_oot uses configurable exponential/linear/no backoff multiplied by smoothed RTT, NOT the SDL Select_T1_Value SRT-based smoothing. The companion ax25_calculate_rtt (line 245) is the closer analogue to the RC==0 smoothing branch."
    notes: |
      Recompute SRT (smoothed round-trip estimate) and the next T1
      timeout. On a fresh-ack path (RC==0) the spec's IIR-style
      formula runs; on a retry path (RC > 0, T1 expired) we just
      bump T1V to next-attempt. Otherwise return without change.

      Canonical name `Select_T1_Value` (the figure's start label is
      just "Select T1" but the existing registry / state pages use
      the longer form).
    decisions:
      - id: rc_eq_0
        question: "RC == 0?"
        predicate: rc_eq_0
      - id: t1_expired
        question: "T1 Expired?"
        predicate: t1_expired
    paths:
      - id: t01_fresh_ack_iir
        path:
          - { decision: rc_eq_0, branch: "Yes" }
          - { action: "SRT <- 7(SRT)/8 + (T1)/8 - (Remaining Time on T1 When Last Stopped)/8", kind: processing }
          - { action: "Next T1 <- 2 * SRT", kind: processing }
      - id: t02_retry_t1_expired
        path:
          - { decision: rc_eq_0,     branch: "No"  }
          - { decision: t1_expired,  branch: "Yes" }
          - { action: "Next T1 <- (RC*0.25)+SRT*2", kind: processing }
      - id: t03_no_change
        path:
          - { decision: rc_eq_0,     branch: "No" }
          - { decision: t1_expired,  branch: "No" }

  # ─── Set Version 2.0 ──────────────────────────────────────────────
  - name: Set_Version_2_0
    references:
      - source: linbpq
        path: L2Code.c
        function: SETUPNEWL2SESSION
        line: 1650
        note: "linbpq has no Set_Version_2_0 routine. Per-port PORTWINDOW/PORTPACLEN/PORTN2/PORTT1/PORTT2 are loaded once from config and copied/derived per session in SETUPNEWL2SESSION; modulo-8 is the default and Ver2point2 is cleared at line 1219 when peer declines XID. No N1/k/T2 reset at 'go-to-2.0' time."
      - source: direwolf
        path: src/ax25_link.c
        function: set_version_2_0
        line: 6408
        note: "Sets srej_enable=none, modulo=8, plus paclen/k_maxframe/n2_retry from config. Half-duplex and N1/T2 are not set here — author flags T2 as a spec erratum at line 6404. Direwolf uses configurable paclen rather than hard-coded N1=2048."
      - source: rax25
        path: src/state.rs
        function: "Data::set_version_2"
        line: 850
        note: "Named set_version_2 (not _2_0). Sets modulus=8, k=4 (NOT spec's 8 — author notes 2025 spec says 8), n2=10. Half-duplex / implicit-reject / N1=2048 / T2=3000 are TODOs."
      - source: linux_oot
        note: "omitted: no version-set subroutine. Configured via setsockopt(AX25_EXTSEQ) in af_ax25.c:642 and inlined 'ax25->modulus = AX25_MODULUS' on connect/SABM handling. No T1V/N1/N2 retuning per figc4.7."
    notes: |
      Configure all v2.0-specific parameters. Single multi-line
      processing box in the figure; transcribed as one action per
      line.
    paths:
      - id: t01_v2_0_defaults
        path:
          - { action: "Set Half Duplex",     kind: processing }
          - { action: "Set Implicit Reject", kind: processing }
          - { action: "Modulo <- 8",         kind: processing }
          - { action: "N1 <- 2048",          kind: processing }
          - { action: "k <- 8",              kind: processing }
          - { action: "T2 <- 3000",          kind: processing }
          - { action: "N2 <- 10",            kind: processing }

  # ─── Set Version 2.2 ──────────────────────────────────────────────
  - name: Set_Version_2_2
    references:
      - source: linbpq
        path: L2Code.c
        function: L2_PROCESS
        line: 952
        note: "Setting Ver2point2 := TRUE happens at two sites: ProcessXIDCommand line 952 ('Must support 2.2 if sent XID') and L2_PROCESS line 1145 ('Must support 2.2 if responded to XID'). Modulo stays 8 (linbpq does not implement true mod-128 windows); N1/k/T2/N2 are not reset — the Ver2point2 flag only gates SREJ emission and SABME acceptance. Significant divergence: linbpq's '2.2 mode' is selective-reject support, not full mod-128."
      - source: direwolf
        path: src/ax25_link.c
        function: set_version_2_2
        line: 6425
        note: "Sets srej_enable=single (with comment noting XID can upgrade to multi), modulo=128, plus paclen/k_maxframe/n2_retry from config. Half-duplex, N1=2048, T2=3000, N2=10 fixed-value constants from figc4.7 are not set explicitly — direwolf uses configured values throughout."
      - source: rax25
        path: src/state.rs
        function: "Data::set_version_2_2"
        line: 835
        note: "Sets modulus=128, k=32, n2=10. Half-duplex SREJ / N1=2048 / T2=3000 are TODOs. pub(crate) visibility (unique vs other subroutines)."
      - source: linux_oot
        note: "omitted: same as Set_Version_2_0 — only 'ax25->modulus = AX25_EMODULUS' assignments exist (ax25_ds_in.c:42,156, af_ax25.c:482,516). figc4.7 timer/window retuning is absent."
    notes: |
      Configure all v2.2-specific parameters. Differs from v2.0 in
      Selective Reject (vs Implicit Reject), Modulo 128 (vs 8) and
      k = 32 (vs 8).
    paths:
      - id: t01_v2_2_defaults
        path:
          - { action: "Set Half Duplex",      kind: processing }
          - { action: "Set Selective Reject", kind: processing }
          - { action: "Modulo <- 128",        kind: processing }
          - { action: "N1 <- 2048",           kind: processing }
          - { action: "k <- 32",              kind: processing }
          - { action: "T2 <- 3000",           kind: processing }
          - { action: "N2 <- 10",             kind: processing }
