schemaVersion: 1

identity:
  callsign: GB7BBB
  alias: NODEB

ports:
  - id: vhf
    enabled: true
    transport:
      kind: kiss-tcp
      host: netsim
      port: 8101

netRom:
  enabled: true
  broadcast: true
  connect: true
  sweepIntervalSeconds: 20
  inp3:
    enabled: true
    preferInp3Routes: true
    l3RttInterval: "00:00:05"
    l3RttResetWindow: "00:00:30"
    rifInterval: "00:00:10"
    positiveDebounce: "00:00:02"

services:
  banner: "Welcome to {node} ({call})"
  prompt: "{call}> "

management:
  telnet:
    enabled: true
    bind: 0.0.0.0
    port: 8011
  http:
    bind: 0.0.0.0
    port: 8080
