schemaVersion: 1

identity:
  callsign: GB7AAA
  alias: NODEA

ports:
  - id: vhf
    enabled: true
    transport:
      kind: kiss-tcp
      host: netsim
      port: 8100

netRom:
  enabled: true
  broadcast: true            # originate NODES so the two nodes discover each other
  connect: true              # open connected-mode interlinks (INP3 rides these)
  sweepIntervalSeconds: 20   # fast NODES + obsolescence sweep for the demo
  inp3:
    enabled: true
    preferInp3Routes: true   # forward/select by measured time
    l3RttInterval: "00:00:05"
    l3RttResetWindow: "00:00:30"
    rifInterval: "00:00:10"
    positiveDebounce: "00:00:02"

services:
  banner: "Welcome to {node} ({call})"
  prompt: "{call}> "

management:
  telnet:
    enabled: true
    bind: 0.0.0.0
    port: 8011
  http:
    bind: 0.0.0.0
    port: 8080
