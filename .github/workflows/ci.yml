name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # GitHub will force JavaScript actions onto Node.js 24 from
  # June 2nd, 2026 and remove Node.js 20 from the runner on
  # September 16th, 2026. Opting in early both silences the
  # deprecation warning and lets us catch any Node 24 breakage
  # well ahead of the forced cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test (${{ matrix.project }})
    runs-on: [self-hosted, Linux, X64]
    # Self-hosted Linux runners — zero GitHub Actions minutes consumed.
    strategy:
      fail-fast: false
      matrix:
        project:
          - Packet.Agw.Tests
          - Packet.Aprs.Tests
          - Packet.Ax25.Conformance.Tests
          - Packet.Ax25.Properties
          - Packet.Ax25.Tests
          - Packet.Axudp.Tests
          - Packet.Core.Tests
          - Packet.Interop.Tests
          - Packet.Kiss.NinoTnc.Tests
          - Packet.Kiss.Tests
          - Packet.Node.Tests
          - Packet.Rhp2.Tests
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: test
        run: |
          dotnet test tests/${{ matrix.project }}/${{ matrix.project }}.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --filter "Category!=HardwareLoop&Category!=Interop"

      - name: upload test results
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.project }}
          path: 'tests/${{ matrix.project }}/TestResults/*.trx'
          retention-days: 7

  ts-build-test:
    name: TS — ts-spec + web/ax25 build + test
    runs-on: [self-hosted, Linux, X64]
    # ts-spec carries pre-generated *.g.ts (sourced from m0lte/ax25sdl);
    # web/ax25 consumes it via `file:../../ts-spec`. Both stay in this
    # repo while the npm publish path from m0lte/ax25sdl is parked. Once
    # that's resolved, ts-spec drops out (sourced from npm) and web/ax25
    # moves to its own repo.
    steps:
      - uses: actions/checkout@v6

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ts-spec/package-lock.json

      - name: ts-spec typecheck + test + build
        run: |
          cd ts-spec
          npm ci
          npm run typecheck
          npm test
          npm run build

      - name: web/ax25 build + test
        run: |
          cd web/ax25
          npm ci
          npm run build
          npm test
